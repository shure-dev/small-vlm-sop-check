sop:
  id: f051_w001_connector_seated
  name: 'Factory Ego: f051_w001_connector_seated'
  domain_hint: First-person (head-mounted) camera footage of a worker in an electronics
    factory, looking down at their own hands. The worker wears a blue smock.
questions:
- id: hold_connector
  ask: Is the worker holding and manipulating a connector, cable, or part in the hands?
  values:
  - 'yes'
  - 'no'
- id: both_hands
  ask: Are both of the worker's hands visible and working together?
  values:
  - 'yes'
  - 'no'
- id: rack_visible
  ask: Are green circuit boards visible in the upper part of the frame?
  values:
  - 'yes'
  - 'no'
events:
  hold_connector:
    evidence: hold_connector==yes
    min_frames: 2
  both_hands:
    evidence: both_hands==yes
    min_frames: 2
  rack_visible:
    evidence: rack_visible==yes
    min_frames: 2
relations: []
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: migrated from the legacy Qwen comparison SOP; not ground truth
