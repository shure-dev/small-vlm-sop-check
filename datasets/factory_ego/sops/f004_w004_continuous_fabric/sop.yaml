sop:
  id: f004_w004_continuous_fabric
  name: 黒い衣類の整理とミシンへの送り込み
  domain_hint: 作業者視点で、黒い衣類、作業台、ミシンを扱う20秒の工場動画
events:
- id: move_black_garment_to_upper_left
  ask: 作業者が黒い衣類を両手で持ち上げ、作業台の左上側へ移している
  values:
  - 'yes'
  - 'no'
- id: spread_garment_in_front_of_sewing_machine
  ask: 作業者が作業台上の黒い衣類を両手で手元へ引き寄せ、ミシン前に広げている
  values:
  - 'yes'
  - 'no'
- id: align_garment_edge_layers
  ask: 作業者が黒い衣類の縁を両手でつまみ、端の重なりを揃えている
  values:
  - 'yes'
  - 'no'
- id: feed_garment_edge_under_presser_foot
  ask: 作業者が揃えた黒い衣類の縁をミシンの押さえ金の下へ送り込んでいる
  values:
  - 'yes'
  - 'no'
