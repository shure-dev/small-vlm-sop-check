benchmark_id: factory_ego_model_matrix_v1
dataset: factory_ego
split: development
queries: out/factory-ego-benchmark-v1-queries.json
unit_count: 20
event_query_count: 68
task: temporal_grounding
prompt_condition: shared_event_query_and_timestamp_json_contract
limits:
  max_parameters_b: 4.0
  video_fps: 2.0
  video_width: 640
  max_pixels: 50176
  max_tokens: 100
  temperature: 0

# statusはスモーク後に更新する。unsupportedも削除せず、再現可能な失敗理由を残す。
models:
