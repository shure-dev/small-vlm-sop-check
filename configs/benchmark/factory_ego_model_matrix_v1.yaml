    model: mlx-community/Qwen3.5-0.8B-MLX-4bit
    upstream_model: Qwen/Qwen3.5-0.8B
    name: Qwen3.5-0.8B 4-bit
    parameters_b: 0.8
    family: qwen
    suppress_reasoning: true
